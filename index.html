<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>packops</title>
    <script>
      (function () {
        var t = localStorage.getItem('packops_theme');
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
        var ct = localStorage.getItem('packops_color_theme');
        var validThemes = ['warm-cream', 'white-sage', 'neutral-slate'];
        if (ct && validThemes.indexOf(ct) !== -1 && ct !== 'warm-cream') {
          document.documentElement.classList.add('theme-' + ct);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
